<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --text: #f0f0f0;
      --text-muted: #666;
      --text-dim: #999;
      --green: #00e676;
      --yellow: #ffd600;
      --red: #ff1744;
      --accent: #00e676;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 14px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 400;
      max-width: 480px;
      line-height: 1.6;
    }

    /* Input card */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder { color: var(--text-muted); }

    .btn {
      margin-top: 16px;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 48px 0;
      animation: fadeUp 0.3s ease both;
    }

    .loading.show { display: block; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    .loading p {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Results */
    #results { display: none; animation: fadeUp 0.5s ease both; }
    #results.show { display: block; }

    /* Score banner */
    .score-banner {
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .score-banner.credible  { background: #001f0f; border: 1px solid #00e67633; }
    .score-banner.uncertain { background: #1f1800; border: 1px solid #ffd60033; }
    .score-banner.misleading { background: #1f0008; border: 1px solid #ff174433; }

    .score-number {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .credible  .score-number { color: var(--green); }
    .uncertain .score-number { color: var(--yellow); }
    .misleading .score-number { color: var(--red); }

    .score-label { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }

    .verdict-badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .credible  .verdict-badge { background: #00e67620; color: var(--green); }
    .uncertain .verdict-badge { background: #ffd60020; color: var(--yellow); }
    .misleading .verdict-badge { background: #ff174420; color: var(--red); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-family: 'DM Mono', monospace;
    }

    .reasoning-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-dim);
    }

    /* Flags */
    .flag-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .flag-item:last-child { margin-bottom: 0; }

    .flag-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .flag-type {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: #ff174415;
      color: var(--red);
      font-family: 'DM Mono', monospace;
    }

    .flag-quote {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--yellow);
    }

    .flag-explanation {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Search suggestion */
    .search-link {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .search-link:hover { border-color: var(--accent); }

    .search-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .search-query {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
    }

    /* Error */
    .error-box {
      display: none;
      background: #1f0008;
      border: 1px solid #ff174433;
      border-radius: 12px;
      padding: 18px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
    }

    .error-box.show { display: block; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <p class="eyebrow">AI-Powered Tool</p>
      <h1>Fake News<br/><span>Detector</span></h1>
      <p class="subtitle">Paste any headline or article snippet and get an instant credibility analysis powered by AI.</p>
    </header>

    <div class="input-card">
      <label for="headline">Headline or article snippet</label>
      <textarea id="headline" placeholder="e.g. Scientists confirm chocolate cures cancer, big pharma is hiding it..."></textarea>
      <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze →</button>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Analyzing credibility...</p>
    </div>

    <div id="results">

      <div class="score-banner" id="scoreBanner">
        <div>
          <p class="score-label">Credibility Score</p>
          <p class="score-number" id="scoreNumber">--</p>
          <p style="font-size:12px;color:var(--text-muted);margin-top:4px;">out of 100</p>
        </div>
        <div style="text-align:right">
          <p class="score-label" style="margin-bottom:10px">Verdict</p>
          <span class="verdict-badge" id="verdictBadge">--</span>
        </div>
      </div>

      <div class="card">
        <p class="card-title">Reasoning</p>
        <p class="reasoning-text" id="reasoning">--</p>
      </div>

      <div class="card" id="flagsCard">
        <p class="card-title">Flags (<span id="flagCount">0</span>)</p>
        <div id="flagsList"></div>
      </div>

      <div class="card">
        <p class="card-title">Verify This Claim</p>
        <a id="searchLink" href="#" target="_blank" class="search-link">
          <span class="search-icon">🔍</span>
          <span class="search-query" id="searchQuery">--</span>
        </a>
      </div>

    </div>
  </div>

  <script>
    async function analyze() {
      const headline = document.getElementById('headline').value.trim();
      const btn = document.getElementById('analyzeBtn');
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const errorBox = document.getElementById('errorBox');

      // Reset
      results.classList.remove('show');
      errorBox.classList.remove('show');

      if (headline.length < 10) {
        showError('Please enter a headline of at least 10 characters.');
        return;
      }

      // Show loading
      btn.disabled = true;
      loading.classList.add('show');

      try {
        const res = await fetch('http://127.0.0.1:5000/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ headline })
        });

        const data = await res.json();

        if (data.error) {
          showError('Error: ' + data.error);
          return;
        }

        renderResults(data);

      } catch (err) {
        showError('Could not connect to the server. Make sure app.py is running.');
      } finally {
        btn.disabled = false;
        loading.classList.remove('show');
      }
    }

    function renderResults(data) {
      const score = data.credibility_score;
      const verdict = data.verdict;

      // Score banner color
      const banner = document.getElementById('scoreBanner');
      banner.className = 'score-banner';
      if (score >= 60) banner.classList.add('credible');
      else if (score >= 35) banner.classList.add('uncertain');
      else banner.classList.add('misleading');

      document.getElementById('scoreNumber').textContent = score;
      document.getElementById('verdictBadge').textContent = verdict;
      document.getElementById('reasoning').textContent = data.reasoning;

      // Flags
      const flagsList = document.getElementById('flagsList');
      flagsList.innerHTML = '';
      document.getElementById('flagCount').textContent = data.flags.length;

      data.flags.forEach(flag => {
        flagsList.innerHTML += `
          <div class="flag-item">
            <div class="flag-top">
              <span class="flag-type">${flag.type}</span>
              <span class="flag-quote">"${flag.quote}"</span>
            </div>
            <p class="flag-explanation">${flag.explanation}</p>
          </div>
        `;
      });

      // Search link
      const query = data.suggested_search;
      document.getElementById('searchQuery').textContent = query;
      document.getElementById('searchLink').href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;

      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }

    function showError(msg) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }

    // Allow Cmd+Enter to submit
    document.getElementById('headline').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.metaKey) analyze();
    });
  </script>
</body>
</html>
